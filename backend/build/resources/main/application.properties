# 1. 데이터베이스 연결 설정
# 'operation_seoul'은 아까 워크벤치에서 만든 DB 이름이어야 합니다.
spring.datasource.url=jdbc:mysql://localhost:3306/operation_seoul?serverTimezone=Asia/Seoul
spring.datasource.username=root

# 2. MySQL 설치할 때 설정한 비밀번호 (아까 1234로 하셨다면 1234 입력)
spring.datasource.password=1234

# 3. JPA/Hibernate 설정 (자동 테이블 생성 기능)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true